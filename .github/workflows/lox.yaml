name: Lox CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install system dependencies (PCRE)
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcre3 libpcre3-dev

      - name: Set up Haskell (Stack)
        uses: haskell-actions/setup@v2
        with:
          enable-stack: true

      - name: Cache Stack dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.stack
            .stack-work
          key: ${{ runner.os }}-stack-${{ hashFiles('stack.yaml.lock') }}
          restore-keys: |
            ${{ runner.os }}-stack-

      - name: Cache Dart SDK
        id: cache-dart
        uses: actions/cache@v5
        with:
          path: ~/dart
          key: ${{ runner.os }}-dart-2.19.6

      - name: Install Dart 2.x (if not cached)
        if: steps.cache-dart.outputs.cache-hit != 'true'
        run: |
          wget https://storage.googleapis.com/dart-archive/channels/stable/release/2.19.6/sdk/dartsdk-linux-x64-release.zip
          unzip dartsdk-linux-x64-release.zip -d $HOME/dart

      - name: Add Dart to PATH
        run: echo "$HOME/dart/dart-sdk/bin" >> $GITHUB_PATH

      - name: Verify Dart installation
        run: dart --version

      - name: Build Stack project
        run: stack build

      - name: Build tester
        run: |
          cd mothership
          make get

      - name: Run tests
        run: |
          chmod +x test.sh
          ./test.sh
